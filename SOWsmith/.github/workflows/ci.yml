name: CI

# Validates the reference engine on every push / PR: the deterministic offline-mock
# plumbing tests (structure, footer, STANDARD vs LEGAL routing, refusal, path-traversal
# guard, live JSON API). No secrets and no Azure/M365 tenant are required.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (engine + dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Regenerate the knowledge base (smoke check)
        run: python knowledge-base/generator/_build_knowledge_base.py

      - name: Run the scripted demo (offline mock)
        run: PYTHONPATH=agent/src python -m bid_package_agent.cli demo
